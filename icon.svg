<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#111b3d" />
      <stop offset="100%" stop-color="#03050c" />
    </radialGradient>
    
    <!-- Neon Cyan Glow -->
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Neon Magenta Glow -->
    <filter id="neonGlowMagenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#00f0ff" stroke-width="6" stroke-opacity="0.3"/>
  
  <!-- Outer Neon Grid Lines -->
  <path d="M 64,0 L 64,512 M 128,0 L 128,512 M 192,0 L 192,512 M 256,0 L 256,512 M 320,0 L 320,512 M 384,0 L 384,512 M 448,0 L 448,512" stroke="rgba(0, 240, 255, 0.08)" stroke-width="2" />
  <path d="M 0,64 L 512,64 M 0,128 L 512,128 M 0,192 L 512,192 M 0,256 L 512,256 M 0,320 L 512,320 M 0,384 L 512,384 M 0,448 L 512,448" stroke="rgba(0, 240, 255, 0.08)" stroke-width="2" />

  <!-- Orbiting Shield -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255, 0, 127, 0.15)" stroke-width="8" stroke-dasharray="15 25" />
  
  <!-- Glowing Glass Man Shape (A stylized geometric astronaut helmet in cyan) -->
  <!-- Helmet Shield -->
  <path d="M 196,280 C 196,190 316,190 316,280 C 316,330 300,350 256,350 C 212,350 196,330 196,280 Z" 
        fill="rgba(0, 240, 255, 0.15)" 
        stroke="#00f0ff" 
        stroke-width="12" 
        filter="url(#neonGlowCyan)" />
        
  <!-- Inner Glass Reflections (Geometric shards) -->
  <polygon points="216,260 256,230 240,270" fill="rgba(255, 255, 255, 0.4)" />
  <polygon points="270,240 296,270 276,280" fill="rgba(255, 255, 255, 0.2)" />
  <polygon points="230,290 256,330 240,310" fill="rgba(255, 255, 255, 0.3)" />

  <!-- Outer spacesuit neck ring -->
  <path d="M 170,360 C 170,410 342,410 342,360" fill="none" stroke="#ff007f" stroke-width="8" filter="url(#neonGlowMagenta)" />
  
  <!-- Glowing stars/crosses in the background -->
  <path d="M 120,120 L 120,100 M 110,110 L 130,110" stroke="#00f0ff" stroke-width="4" filter="url(#neonGlowCyan)" />
  <path d="M 392,120 L 392,100 M 382,110 L 402,110" stroke="#ff007f" stroke-width="4" filter="url(#neonGlowMagenta)" />
  <circle cx="380" cy="380" r="6" fill="#00f0ff" filter="url(#neonGlowCyan)" />
  <circle cx="130" cy="390" r="4" fill="#ff007f" filter="url(#neonGlowMagenta)" />
</svg>
